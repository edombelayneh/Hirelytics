name: PR Checks

on:
  pull_request:
    branches: ['main']

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Ensure this matches the "@types/node": __ dependency
          node-version: '20'
          cache: 'npm'

      # Caches the .next/cache directory to significantly speed up your Next.js builds on subsequent runs
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('app/**/*.[jt]s', 'app/**/*.[jt]sx', '__tests__/**/*.[jt]s', '__tests__/**/*.[jt]sx', 'components/**/*.[jt]s', 'components/**/*.[jt]sx', 'lib/**/*.[jt]s', 'lib/**/*.[jt]sx', 'utils/**/*.[jt]s', 'utils/**/*.[jt]sx', 'types/**/*.[jt]s', 'types/**/*.[jt]sx', 'data/**/*.[jt]s', 'data/**/*.[jt]sx', 'middleware.ts', 'next.config.ts', 'tailwind.config.ts', 'eslint.config.mjs', 'tsconfig.json', 'postcss.config.mjs', 'vitest.config.mts') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        # Executes "eslint" as defined in package.json
        run: npm run lint

      - name: Run Tests
        # Executes "vitest". GitHub Actions automatically sets the environment variable CI=true.
        # Vitest detects this and runs your tests once and exits, rather than hanging in watch mode.
        run: npm run test

      - name: Run Build
        # Executes "next build --webpack" to ensure your Next.js app compiles successfully.
        # Note: Next.js will automatically run ESLint again during this step via eslint-config-next.
        run: npm run build
